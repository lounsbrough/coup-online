version: 2
updates:
  - package-ecosystem: "npm"
    directories:
      - "/shared"
      - "/server"
      - "/client"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 3
    groups:
      nonMajor:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 3
